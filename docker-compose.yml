services:
  postgres:
    image: postgres:15-alpine
    container_name: canakci-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: canakci
      POSTGRES_PASSWORD: canakci_secret
      POSTGRES_DB: canakci_seramik
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
